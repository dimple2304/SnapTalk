<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile / SnapTalk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .active-tab-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: #6366f1;
    }
  </style>
</head>

<body class="bg-slate-50 text-gray-800 font-sans">
  <div class="container mx-auto flex">

    <!-- LEFT SIDEBAR (MOCKED PARTIAL) -->
    <aside class="hidden lg:block w-1/4 sticky top-0 h-screen p-4">
      
    </aside>

    <!-- MAIN COLUMN -->
    <main class="w-full lg:w-1/2 min-h-screen bg-white border-l border-r border-slate-200">
      <!-- Profile Header -->
      <div class="sticky top-0 z-20 flex items-center space-x-4 bg-white/95 backdrop-blur-sm px-4 py-2 border-b border-slate-100">
        <a href="/" class="p-2 rounded-full hover:bg-slate-100">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </a>
        <div>
          <h2 class="text-base font-bold text-gray-900">Charlie</h2>
          <p class="text-xs text-gray-500">128</p>
        </div>
      </div>

      <!-- Banner -->
      <div class="relative h-[150px] bg-slate-200">
        <img src="https://placehold.co/1200x400/334155/e2e8f0?text=" alt="Banner" class="w-full h-full object-cover">
      </div>

      <!-- Profile Section -->
      <div class="px-4 pb-4">
        <div class="flex justify-between items-start">
          <!-- Avatar: Perfect circle with border overlapping banner -->
          <div class="relative -mt-14 ml-2">
            <img class="h-28 w-28 md:h-32 md:w-32 rounded-full border-4 border-white object-cover" src="https://placehold.co/150x150/ca8a04/ffffff?text=C" alt="Profile Pic">
          </div>

          <!-- Actions: Placed to the right -->
          <div class="flex items-center space-x-3 mt-3">
            <button class="px-5 py-2 border border-gray-200 text-gray-800 text-sm font-bold rounded-full hover:bg-slate-50 transition-colors">
              Follow
            </button>
          </div>
        </div>

        <!-- User Identity -->
        <div class="mt-2 ml-2">
          <h2 class="text-xl font-bold text-gray-900">Charlie</h2>
          <p class="text-sm text-gray-500">@charliethomp</p>
        </div>

        <!-- Bio & Link -->
        <div class="mt-3 ml-2 space-y-1">
          <p class="text-gray-700 text-sm font-medium">Full-stack developer & photography enthusiast.</p>
          <a href="#" class="text-blue-500 text-sm font-medium hover:underline block">github</a>
        </div>

        <!-- Stats -->
        <div class="mt-4 ml-2 flex space-x-4 text-sm font-medium">
          <div class="flex space-x-1">
            <span class="font-bold text-gray-900">842</span>
            <span class="text-gray-500">Following</span>
          </div>
          <div class="flex space-x-1">
            <span class="font-bold text-gray-900">1.5k</span>
            <span class="text-gray-500">Followers</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-slate-100 mt-4">
        <div class="relative flex-1 text-center py-4 text-sm font-bold text-indigo-600">
          All posts
          <!-- <div class="active-tab-line"></div> -->
        </div>
        <!-- <div class="flex-1 text-center py-4 text-sm font-bold text-gray-500 hover:bg-slate-50 cursor-pointer">
          Likes
        </div> -->
      </div>

      <!-- Posts -->
      <div class="p-3 space-y-4">
        <article class="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm">
          <div class="flex items-start justify-between">
            <div class="flex space-x-3">
              <img class="h-10 w-10 rounded-full object-cover" src="https://placehold.co/40x40/ca8a04/ffffff?text=C" alt="Avatar">
              <div>
                <div class="flex items-center space-x-1">
                  <h4 class="font-bold text-sm">charlie</h4>
                  <span class="text-xs text-gray-400">@charliethomp · 2h ago</span>
                </div>
                <p class="mt-1 text-sm text-gray-700 font-medium">Excited to share the new project layout! 🚀</p>
              </div>
            </div>
            <button class="text-gray-300 hover:text-gray-500">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM18 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
              </svg>
            </button>
          </div>
          <div class="mt-4 rounded-2xl overflow-hidden bg-slate-50 border border-slate-100">
            <img src="https://placehold.co/600x400/f1f5f9/94a3b8?text=Project+Preview" class="w-full object-cover max-h-80" alt="Post">
          </div>
          <div class="mt-4 flex items-center space-x-6 text-gray-400">
            <button class="flex items-center space-x-2 hover:text-pink-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 016.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z"></path>
              </svg>
              <span class="text-xs font-bold">158</span>
            </button>
            <button class="flex items-center space-x-2 hover:text-blue-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
              </svg>
              <span class="text-xs font-bold">45</span>
            </button>
          </div>
        </article>
      </div>
    </main>

    <!-- RIGHT SIDEBAR (MOCKED PARTIAL) -->


    <!-- Mobile Nav -->

</body>

</html>
